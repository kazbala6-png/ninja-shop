<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brand Store — Витрина</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #18181c;
            --accent-color: #2f80ed;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 12px;
            padding-bottom: 130px;
        }

        header {
            margin-bottom: 14px;
            text-align: center;
        }

        header h1 {
            font-size: 20px;
            font-weight: 700;
        }

        header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* --- КАТЕГОРИИ (ФИЛЬТР) --- */
        .categories-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 14px;
            scrollbar-width: none; /* Скрывает скроллбар в Firefox */
        }

        .categories-bar::-webkit-scrollbar {
            display: none; /* Скрывает скроллбар в Chrome/Safari */
        }

        .cat-btn {
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cat-btn.active {
            background: var(--accent-color);
            color: #ffffff;
            border-color: var(--accent-color);
            font-weight: 600;
        }

        /* --- СЕТКА ТОВАРОВ --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            object-position: center top;
            background-color: #222;
        }

        .product-info {
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .product-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .product-price {
            font-size: 15px;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .size-selector {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .size-btn {
            flex: 1;
            min-width: 28px;
            background: #242429;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 11px;
            padding: 5px 0;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }

        .size-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            font-weight: bold;
        }

        .add-btn {
            width: 100%;
            background-color: #242429;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .add-btn.added {
            background-color: #27ae60;
            border-color: #27ae60;
        }

        /* --- НИЖНЯЯ ПАНЕЛЬ С КОРЗИНОЙ --- */
        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(24, 24, 28, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .cart-summary {
            display: flex;
            flex-direction: column;
        }

        .cart-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        .cart-total {
            font-size: 16px;
            font-weight: 700;
        }

        .submit-btn {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>CLOTHING STORE</h1>
        <p>Выберите вещи и отправьте запрос менеджеру</p>
    </header>

    <!-- Горизонтальные категории -->
    <div class="categories-bar">
        <button class="cat-btn active" onclick="filterCategory('all', event)">Все</button>
        <button class="cat-btn" onclick="filterCategory('shoes', event)">Кроссовки</button>
        <button class="cat-btn" onclick="filterCategory('outerwear', event)">Верх</button>
        <button class="cat-btn" onclick="filterCategory('pants', event)">Низ</button>
        <button class="cat-btn" onclick="filterCategory('hats', event)">Головные уборы</button>
    </div>

    <!-- Сетка товаров -->
    <div class="products-grid" id="products"></div>

    <!-- Фиксированный футер -->
    <div class="footer-bar">
        <div class="cart-summary">
            <span class="cart-count" id="cart-count">Товаров: 0</span>
            <span class="cart-total" id="cart-total">0 ₸</span>
        </div>
        <button class="submit-btn" id="submit-btn" onclick="sendOrder()">Обсудить с менеджером 💬</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // МАССИВ ТОВАРОВ (Меняй ссылки на свои фото в параметре image)
        const products = [
            // --- КРОССОВКИ (shoes) ---
            {
                id: 1,
                category: "shoes",
                name: "Кроссовки Nike Air Max",
                price: 45000,
                image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&auto=format&fit=crop&q=80",
                sizes: ["40", "41", "42", "43"]
            },
            
            // --- ВЕРХНЯЯ ОДЕЖДА (outerwear) ---
            {
                id: 2,
                category: "outerwear",
                name: "Оверсайз Футболка Black",
                price: 8500,
                image: "https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=600&auto=format&fit=crop&q=80",
                sizes: ["M", "L", "XL"]
            },
            {
                id: 3,
                category: "outerwear",
                name: "Худи Minimal White",
                price: 16500,
                image: "https://images.unsplash.com/photo-1556905055-8f358a7a47b2?w=600&auto=format&fit=crop&q=80",
                sizes: ["S", "M", "L"]
            },

            // --- НИЖНЯЯ ОДЕЖДА (pants) ---
            {
                id: 4,
                category: "pants",
                name: "Штаны Cargo Streetwear",
                price: 18000,
                image: "https://images.unsplash.com/photo-1624378439575-d8705ad7ae80?w=600&auto=format&fit=crop&q=80",
                sizes: ["M", "L", "XL"]
            },

            // --- ГОЛОВНЫЕ УБОРЫ (hats) ---
            {
                id: 5,
                category: "hats",
                name: "Кепка Minimalist Logo",
                price: 7500,
                image: "https://images.unsplash.com/photo-1588850561407-ed78c282e89b?w=600&auto=format&fit=crop&q=80",
                sizes: ["One Size"]
            }
        ];

        let cart = {};
        let currentCategory = 'all';

        function filterCategory(cat, event) {
            currentCategory = cat;
            
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderProducts();
        }

        function renderProducts() {
            const container = document.getElementById('products');
            
            const filteredProducts = currentCategory === 'all' 
                ? products 
                : products.filter(p => p.category === currentCategory);

            container.innerHTML = filteredProducts.map(p => {
                const selectedSize = cart[p.id]?.size || p.sizes[0];
                const isAdded = !!cart[p.id];

                return `
                    <div class="product-card">
                        <img src="${p.image}" class="product-img" alt="${p.name}">
                        <div class="product-info">
                            <div>
                                <div class="product-title">${p.name}</div>
                                <div class="product-price">${p.price.toLocaleString()} ₸</div>
                            </div>
                            
                            <div>
                                <div class="size-selector">
                                    ${p.sizes.map(s => `
                                        <div class="size-btn ${selectedSize === s ? 'active' : ''}" 
                                             onclick="selectSize(${p.id}, '${s}')">${s}</div>
                                    `).join('')}
                                </div>

                                <button class="add-btn ${isAdded ? 'added' : ''}" onclick="toggleCart(${p.id})">
                                    ${isAdded ? '✓ В запросе' : '+ Добавить'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function selectSize(productId, size) {
            if (!cart[productId]) {
                cart[productId] = { ...products.find(p => p.id === productId), size: size };
            } else {
                cart[productId].size = size;
            }
            renderProducts();
            updateFooter();
        }

        function toggleCart(productId) {
            if (cart[productId]) {
                delete cart[productId];
            } else {
                const product = products.find(p => p.id === productId);
                cart[productId] = { ...product, size: product.sizes[0] };
            }
            renderProducts();
            updateFooter();
        }

        function updateFooter() {
            const items = Object.values(cart);
            const total = items.reduce((sum, item) => sum + item.price, 0);
            const count = items.length;

            document.getElementById('cart-count').innerText = `Товаров: ${count}`;
            document.getElementById('cart-total').innerText = `${total.toLocaleString()} ₸`;

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.style.display = count > 0 ? 'block' : 'none';
        }

        function sendOrder() {
            const items = Object.values(cart);
            if (items.length === 0) return;

            const orderData = {
                items: items.map(i => ({
                    name: i.name,
                    price: i.price,
                    size: i.size,
                    image: i.image
                })),
                totalPrice: items.reduce((sum, i) => sum + i.price, 0)
            };

            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }

        // Старт отрисовки
        renderProducts();
    </script>
</body>
</html>
